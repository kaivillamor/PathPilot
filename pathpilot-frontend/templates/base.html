<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PathPilot{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <div>
        <p class="eyebrow">Degree + career planner</p>
        <a class="brand" href="/">PathPilot</a>
      </div>

      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/roadmap">Roadmap</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div class="spinner-overlay" id="spinner-overlay">
    <div class="spinner"></div>
    <p class="spinner-label" id="spinner-label">Loading...</p>
  </div>

  <script>
    function showSpinner(label) {
      document.getElementById("spinner-label").textContent = label || "Loading...";
      document.getElementById("spinner-overlay").classList.add("active");
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
